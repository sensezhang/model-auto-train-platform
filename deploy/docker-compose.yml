# Model Auto Train Platform - Docker Compose 配置
# 支持 GPU 训练

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: hub.ikingtec.com/ai/model-train-backend:v1
    container_name: model-train-backend
    restart: unless-stopped
    shm_size: '8gb'
    env_file:
      # 优先读取数据卷中的 .env（升级不会丢失），其次读取 deploy/ 目录下的 .env
      - path: /mnt/data/.env
        required: false
      - path: .env
        required: false
    volumes:
      # ── 训练数据盘（挂载到服务器 /mnt/data，详见 README.md）─────────────
      # 上传的图片
      - /mnt/data/datasets:/app/datasets
      # COCO 格式中间数据集（训练时自动生成，占用空间较大）
      - /mnt/data/datasets_coco:/app/datasets_coco
      # 训练输出：checkpoint、metrics、log（核心产物）
      - /mnt/data/models:/app/models
      # 导出的数据集（YOLO/COCO 格式）
      - /mnt/data/output:/app/output
      # 训练日志
      - /mnt/data/logs:/app/logs
      # ── 模型缓存（避免重复下载）──────────────────────────────────────────
      # RF-DETR 预训练权重（手动拷贝，详见 README.md）
      - /mnt/data/pretrained:/app/pretrained
      # HuggingFace 缓存（DINOv2 backbone 等）
      - /mnt/data/pretrained:/root/.cache/huggingface/hub
      # PyTorch 模型缓存
      - /mnt/data/.torch:/app/.torch
      # Ultralytics (YOLO) 权重缓存
      - /mnt/data/.ultralytics:/app/.ultralytics
      # SQLite 数据库（持久化，升级容器不丢数据）
      - /mnt/data/db:/app/db
    environment:
      - TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - APP_DB_PATH=/app/db/app.db
    networks:
      - model-train-network
    # GPU 支持 - 需要 NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: hub.ikingtec.com/ai/model-train-frontend:v1
    container_name: model-train-frontend
    restart: unless-stopped
    ports:
      - "30002:80"
    depends_on:
      - backend
    networks:
      - model-train-network

networks:
  model-train-network:
    driver: bridge
