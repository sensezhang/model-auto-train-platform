# YOLO/RF-DETR 训练标注平台 - Docker Compose 配置（CPU 版本）
# 不需要 GPU，适合测试或仅标注使用

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend.cpu
    container_name: yolo-backend
    restart: unless-stopped
    shm_size: '8gb'
    volumes:
      # 数据持久化
      - ./data/app.db:/app/app.db
      - ./data/datasets:/app/datasets
      - ./data/models:/app/models
      - ./data/output:/app/output
      - ./data/exports:/app/data
      # 缓存目录（预训练模型等）
      - ./data/.torch:/app/.torch
      - ./data/.cache:/app/.cache
      - ./data/.ultralytics:/app/.ultralytics
      # RF-DETR预训练权重（离线使用）
      - ./data/pretrained:/app/pretrained
      - ./data/pretrained:/root/.cache/huggingface/hub
    environment:
      - TZ=Asia/Shanghai
    networks:
      - yolo-network

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: yolo-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - yolo-network

networks:
  yolo-network:
    driver: bridge
